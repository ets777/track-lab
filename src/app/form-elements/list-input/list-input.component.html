<app-select-search
  [multiple]="true"
  [suggestions]="allSuggestions"
  [label]="inputLabel"
  [formControl]="innerControl"
>
  @if (removable) {
    <ion-button select-search-end slot="end" fill="clear" size="small" (click)="removed.emit()">
      <ion-icon slot="icon-only" name="close"></ion-icon>
    </ion-button>
  }
</app-select-search>
