@for (_ of items; track $index) {
  <ion-item>
    @if (showIcon) {
      <ion-skeleton-text animated style="width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; margin-right: 12px"></ion-skeleton-text>
    }
    <ion-label>
      @for (_ of lineItems; track $index) {
        <ion-skeleton-text animated [style.width]="$index % 2 === 0 ? '50%' : '75%'"></ion-skeleton-text>
      }
    </ion-label>
  </ion-item>
}
