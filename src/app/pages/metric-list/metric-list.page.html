<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_METRICS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab
    vertical="bottom"
    horizontal="end"
    (click)="goToAddPage()"
  >
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-list>
    @for (metric of metrics; track metric.id) {
      <ion-item class="metric">
        <ion-label style="cursor: pointer" (click)="goToViewPage(metric.id)">
          <div class="title">{{ metric.name | translate }}</div>
        </ion-label>
        <ion-buttons class="item-buttons">
          <ion-button id="open-action-sheet-metric-{{metric.id}}">
            <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-action-sheet
          trigger="open-action-sheet-metric-{{metric.id}}"
          header="{{ 'TK_ACTIONS' | translate }}"
          [buttons]="getMetricActionSheetButtons(metric)"
          (didDismiss)="doMetricAction($event, metric.id)"
        ></ion-action-sheet>
      </ion-item>
    }
  </ion-list>
</ion-content>
