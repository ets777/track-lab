<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_METRICS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab
    vertical="bottom"
    horizontal="end"
    (click)="goToAddPage()"
  >
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-list>
    @for (metric of metrics; track metric.id) {
      <ion-item class="metric">
        <ion-label>
          <div class="title">{{ metric.name | translate }}</div>
        </ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
