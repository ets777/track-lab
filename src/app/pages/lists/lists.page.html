<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_LIBRARY' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab
    vertical="bottom"
    horizontal="end"
    (click)="goToAddPage()"
  >
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-list>
    <ion-item (click)="goTo('/library')">{{ 'TK_ACTIONS' | translate }}</ion-item>
    <ion-item (click)="goTo('/tag-list')">{{ 'TK_TAGS' | translate }}</ion-item>
    @for (dictionary of dictionaries; track dictionary.id) {
      <ion-item class="dictionary" (click)="viewDictionary(dictionary.id)">
        <ion-label>
          <div class="title">{{ dictionary.name | translate }}</div>
        </ion-label>
        <ion-buttons class="item-buttons">
          <ion-button id="open-action-sheet-dictionary-{{dictionary.id}}" (click)="$event.stopPropagation()">
            <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-action-sheet
          trigger="open-action-sheet-dictionary-{{dictionary.id}}"
          header="{{ 'TK_ACTIONS' | translate }}"
          [buttons]="getDictionaryActionSheetButtons(dictionary)"
          (didDismiss)="doDictionaryAction($event, dictionary.id)"
        ></ion-action-sheet>
      </ion-item>
    } @empty {
      <ion-text>{{ 'TK_DICTIONARY_LIST_IS_EMPTY' | translate }}</ion-text>
    }
  </ion-list>
</ion-content>
