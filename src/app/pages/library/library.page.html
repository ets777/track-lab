<ion-header>
  <ion-toolbar>
    <ion-segment value="actions">
      <ion-segment-button
        value="actions"
        content-id="actions"
      >
        <ion-label>{{ 'TK_ACTIONS' | translate }}</ion-label>
      </ion-segment-button>
      <ion-segment-button
        value="tags"
        content-id="tags"
      >
        <ion-label>{{ 'TK_TAGS' | translate }}</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-fab vertical="bottom" horizontal="end" (click)="goToAddPage()">
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  
  <ion-segment-view>
    <ion-segment-content id="actions">
      <ion-list>
        @for (action of actions; track action.id) {
          <ion-item class="action">
            <ion-label>
              <div class="title">{{ action.name }}</div>
              <app-tags [tags]="action.tags"></app-tags>
            </ion-label>
            <ion-buttons class="item-buttons">
              <ion-button id="open-action-sheet-action-{{action.id}}">
                <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
              </ion-button>
            </ion-buttons>
            <ion-action-sheet
              trigger="open-action-sheet-action-{{action.id}}"
              header="{{ 'TK_ACTIONS' | translate }}"
              [buttons]="actionSheetButtons"
              (didDismiss)="doActionAction($event, action.id)"
            ></ion-action-sheet>
          </ion-item>
        }
      </ion-list>
    </ion-segment-content>
    <ion-segment-content id="tags">
      <ion-list>
        @for (tag of tags; track tag.id) {
          <ion-item class="action">
            <div class="title">{{ tag.name }}</div>
            <ion-buttons class="item-buttons">
              <ion-button id="open-action-sheet-tag-{{tag.id}}">
                <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
              </ion-button>
            </ion-buttons>
            <ion-action-sheet
              trigger="open-action-sheet-tag-{{tag.id}}"
              header="{{ 'TK_ACTIONS' | translate }}"
              [buttons]="actionSheetButtons"
              (didDismiss)="doTagAction($event, tag.id)"
            ></ion-action-sheet>
          </ion-item>
        }
      </ion-list>
    </ion-segment-content>
  </ion-segment-view>
</ion-content>
