<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ 'TK_ACTIONS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab vertical="bottom" horizontal="end" (click)="goToAddPage()">
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  @if (isLoading) {
    <app-default-skeleton [showIcon]="false" [lines]="2"></app-default-skeleton>
  } @else {
    <ion-item>
      <ion-input [(ngModel)]="searchQuery" [placeholder]="'TK_SEARCH' | translate">
        <ion-icon slot="start" name="search-outline" style="color: var(--ion-color-medium)"></ion-icon>
      </ion-input>
    </ion-item>
    <ion-list>
      @for (action of filteredActions; track action.id) {
        <ion-item class="action">
          <ion-label style="cursor: pointer" (click)="goToViewPage(action.id)">
            <div class="title">{{ action.name }}</div>
            <app-tags [tags]="action.tags"></app-tags>
          </ion-label>
          <ion-buttons class="item-buttons">
            <ion-button id="open-action-sheet-action-{{action.id}}">
              <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-action-sheet
            trigger="open-action-sheet-action-{{action.id}}"
            header="{{ 'TK_ACTIONS' | translate }}"
            [buttons]="actionActionSheetButtons"
            (didDismiss)="doActionAction($event, action.id)"
          ></ion-action-sheet>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
