<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ getTermName() }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (streak) {
    <ion-list>
      <ion-item>
        <ion-label>
          <p>{{ 'TK_TERM' | translate }}</p>
          <h2>{{ getTermName() }}</h2>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <p>{{ 'TK_START_DATE' | translate }}</p>
          <h2>{{ streak.startDate }}</h2>
        </ion-label>
      </ion-item>
    </ion-list>
  }
</ion-content>
