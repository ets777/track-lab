<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ 'TK_EDIT_METRIC' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="saveMetric()"
        [disabled]="!isFormValid()"
      >{{ 'TK_SAVE' | translate }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (metric) {
    <app-metric-form #editFormRef [metric]="metric"></app-metric-form>
  }
</ion-content>
