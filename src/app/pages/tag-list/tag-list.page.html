<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ 'TK_TAGS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab vertical="bottom" horizontal="end" (click)="goToAddPage()">
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  @if (isLoading) {
    <app-default-skeleton [showIcon]="false" [lines]="1"></app-default-skeleton>
  } @else {
    <ion-item>
      <ion-input [(ngModel)]="searchQuery" [placeholder]="'TK_SEARCH' | translate">
        <ion-icon slot="start" name="search-outline" style="color: var(--ion-color-medium)"></ion-icon>
      </ion-input>
    </ion-item>
    <ion-list>
      @for (tag of filteredTags; track tag.id) {
        <ion-item>
          <ion-label style="cursor: pointer" (click)="goToViewPage(tag.id)">{{ tag.name }}</ion-label>
          <ion-buttons class="item-buttons">
            <ion-button id="open-action-sheet-tag-{{tag.id}}">
              <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-action-sheet
            trigger="open-action-sheet-tag-{{tag.id}}"
            header="{{ 'TK_TAGS' | translate }}"
            [buttons]="tagActionSheetButtons"
            (didDismiss)="doTagAction($event, tag.id)"
          ></ion-action-sheet>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
