<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="stats-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_ACHIEVEMENTS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  @if (loading) {
    <app-default-skeleton></app-default-skeleton>
  } @else {
    <app-achievements-list [achievements]="achievements"></app-achievements-list>
  }
</ion-content>
