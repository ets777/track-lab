<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menuId="stats-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_ACHIEVEMENTS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    @for (achievement of achievements; track achievement.id) {
      <ion-item class="achievement">
        <div class="icon">{{ achievement.icon }}</div>
        <div class="body">
          <div class="title">{{ achievement.title | translate }}</div>
          <div class="description">{{ achievement.description | translate}}
          </div>
        </div>
      </ion-item>
    }
  </ion-list>
</ion-content>
