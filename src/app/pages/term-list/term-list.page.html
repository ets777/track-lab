<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_TERMS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    @for (term of terms; track term.id) {
      <ion-item>
        <ion-label>
          <div>{{ term.name }}</div>
          <ion-note>{{ term.dictionaryName }}</ion-note>
        </ion-label>
        <ion-buttons class="item-buttons">
          <ion-button id="open-action-sheet-term-{{term.id}}">
            <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-action-sheet
          trigger="open-action-sheet-term-{{term.id}}"
          header="{{ 'TK_TERMS' | translate }}"
          [buttons]="termActionSheetButtons"
          (didDismiss)="doTermAction($event, term.id)"
        ></ion-action-sheet>
      </ion-item>
    }
  </ion-list>
</ion-content>
