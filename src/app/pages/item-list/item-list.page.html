<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_ITEMS' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-list>
    @for (item of items; track item.id) {
      <ion-item>
        <ion-label style="cursor: pointer" (click)="router.navigate(['/item', item.id])">
          <div>{{ item.name }}</div>
          <ion-note>{{ item.listName }}</ion-note>
        </ion-label>
        <ion-buttons class="item-buttons">
          <ion-button id="open-action-sheet-item-{{item.id}}">
            <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-action-sheet
          trigger="open-action-sheet-item-{{item.id}}"
          header="{{ 'TK_ITEMS' | translate }}"
          [buttons]="itemActionSheetButtons"
          (didDismiss)="doItemAction($event, item.id)"
        ></ion-action-sheet>
      </ion-item>
    }
  </ion-list>
</ion-content>
