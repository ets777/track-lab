<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ 'TK_NEW_DICTIONARY' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="addDictionary()"
        [disabled]="!isFormValid()"
      >{{ 'TK_ADD' | translate }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <app-dictionary-form #addFormRef></app-dictionary-form>
</ion-content>
