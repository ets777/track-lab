<ion-header>
  <ion-toolbar>
    @if (showBackButton) {
      <app-back-button slot="start"></app-back-button>
    }
    <ion-title>{{ 'TK_HISTORY' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-fab vertical="bottom" horizontal="end" (click)="goToAddPage()">
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-buttons class="date-nav">
    <ion-button (click)="goToPreviousDay()">{{ 'TK_PREV' | translate }}</ion-button>
    <div class="date-center">
      <ion-text class="date-text" (click)="openDatePicker()">{{ displayDate }}</ion-text>
    </div>
    <ion-button (click)="goToNextDay()">{{ 'TK_NEXT' | translate }}</ion-button>
  </ion-buttons>
  <app-date-picker #datePicker [hideTrigger]="true" (dateSelected)="onDateSelected($event)"></app-date-picker>
  <app-activity-list [activities]="activities" [metrics]="metrics" [lists]="lists" [rules]="rules"></app-activity-list>
</ion-content>
