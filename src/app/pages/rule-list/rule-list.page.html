<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="lab-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'TK_RULES' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab
    vertical="bottom"
    horizontal="end"
    (click)="goToAddPage()"
  >
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-list>
    @for (rule of rules; track rule.id) {
      <ion-item>
        <ion-label>
          <div class="title">{{ rule.name }}</div>
        </ion-label>
        <ion-buttons slot="end">
          <ion-button id="open-action-sheet-rule-{{rule.id}}">
            <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-action-sheet
          trigger="open-action-sheet-rule-{{rule.id}}"
          [buttons]="ruleActionSheetButtons"
          (didDismiss)="doRuleAction($event, rule.id)"
        ></ion-action-sheet>
      </ion-item>
    }
  </ion-list>
</ion-content>
