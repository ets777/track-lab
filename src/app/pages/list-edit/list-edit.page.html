<ion-header>
  <ion-toolbar>
    <app-back-button slot="start"></app-back-button>
    <ion-title>{{ 'TK_EDIT' | translate }}
      {{ 'TK_LIST' | translate | lowercase }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="updateList()"
        [disabled]="!isValid"
      >{{ 'TK_SAVE' | translate }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (list) {
    <app-list-form
      #updateFormRef
      [list]="list"
      (validityChange)="isValid = $event"
    ></app-list-form>
  }
</ion-content>
