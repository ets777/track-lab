<ion-header>
  <ion-toolbar>
    <ion-title>Log Activity</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="updateActivity()"
        [disabled]="!isFormValid()"
      >Save</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (activity) {
    <app-activity-form 
      #updateFormRef
      [activity]="activity"
    ></app-activity-form>
  }
</ion-content>
