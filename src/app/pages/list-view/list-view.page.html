<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <app-back-button></app-back-button>
    </ion-buttons>
    <ion-title>{{ list?.name | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openListMenu()">
        <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-fab vertical="bottom" horizontal="end" (click)="goToAddItem()">
    <ion-fab-button>
      <ion-icon src="assets/icon/plus.svg"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  @if (items === null) {
    <app-default-skeleton [showIcon]="false" [lines]="1"></app-default-skeleton>
  } @else {
    <ion-list>
      @for (item of items; track item.id) {
        <ion-item>
          <ion-label>{{ item.name }}</ion-label>
          <ion-buttons slot="end">
            <ion-button (click)="openItemMenu(item.id)">
              <ion-icon src="assets/icon/three-dots-vertical.svg"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-item>
      } @empty {
        <ion-item>
          <ion-label>{{ 'TK_LIST_IS_EMPTY' | translate }}</ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
